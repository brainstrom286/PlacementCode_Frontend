<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Login - Code7</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:24px">
      <span style="font-size:2rem">&#127891;</span>
      <h2>Student Login</h2>
      <p class="subtitle">Access your placement tests</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="submitBtn">Login</button>
      <p id="errorMsg" class="error-msg hidden"></p>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
      <br/><br/>
      <a href="/">← Back to Home</a>
    </div>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
  const user = getUser();
  if (user && user.role === 'student') window.location.href = 'dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const err = document.getElementById('errorMsg');
    err.classList.add('hidden');
    btn.disabled = true;
    btn.innerHTML = '<span class="loader"></span>';
    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: { email: document.getElementById('email').value, password: document.getElementById('password').value }
      });
      if (data.role !== 'student') throw new Error('Not a student account');
      setAuth(data);
      window.location.href = 'dashboard.html';
    } catch(err2) {
      showError(err, err2.message);
      btn.disabled = false;
      btn.textContent = 'Login';
    }
  });
</script>
</body>
</html>
